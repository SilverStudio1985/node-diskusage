name: prebuild

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, arch: x64,   name: win32-x64 }
          - { os: windows-2022, arch: arm64, name: win32-arm64 }
          - { os: macos-13,     arch: x64,   name: darwin-x64 }
          - { os: macos-14,     arch: arm64, name: darwin-arm64 }
          - { os: ubuntu-22.04, arch: x64,   name: linux-x64 }
          - { os: ubuntu-22.04-arm, arch: arm64, name: linux-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci || npm install

      - name: Prebuildify (host arch)
        if: matrix.arch == 'x64' || (matrix.os == 'macos-14' && matrix.arch == 'arm64') || (matrix.os == 'ubuntu-22.04-arm' && matrix.arch == 'arm64')
        run: npx prebuildify --napi --strip

      - name: Prebuildify (windows arm64 cross)
        if: matrix.os == 'windows-2022' && matrix.arch == 'arm64'
        run: npx prebuildify --napi --strip --arch=arm64

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.name }}
          path: prebuilds/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds-all
      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          for d in prebuilds-all/prebuilds-*; do
            cp -r "$d"/* prebuilds/
          done
          ls -R prebuilds
      - run: npm ci || npm install --ignore-scripts
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
