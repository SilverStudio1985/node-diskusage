name: prebuild

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # 允许在 Actions UI 上手动触发，便于先验证 build 不发布

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022,     arch: x64,   name: win32-x64 }
          - { os: windows-2022,     arch: arm64, name: win32-arm64 }
          - { os: macos-13,         arch: x64,   name: darwin-x64 }
          - { os: macos-14,         arch: arm64, name: darwin-arm64 }
          - { os: ubuntu-22.04,     arch: x64,   name: linux-x64 }
          # 如果该 label 在你账户下不可见，可改成 ubuntu-24.04-arm
          # 或者降级方案：去掉这一行，linux-arm64 改在 ubuntu-22.04 上用 QEMU 跨架构构建
          - { os: ubuntu-22.04-arm, arch: arm64, name: linux-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 跳过 install 脚本，避免 node-gyp-build 在 prebuildify 之前先编译一次
      - name: Install deps (no scripts)
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Prebuildify (host arch)
        if: matrix.arch == 'x64' || (matrix.os == 'macos-14' && matrix.arch == 'arm64') || (matrix.os == 'ubuntu-22.04-arm' && matrix.arch == 'arm64')
        run: npx prebuildify --napi --strip

      - name: Prebuildify (windows arm64 cross)
        if: matrix.os == 'windows-2022' && matrix.arch == 'arm64'
        run: npx prebuildify --napi --strip --arch=arm64

      - name: Show produced binaries
        shell: bash
        run: ls -lR prebuilds || true

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.name }}
          path: prebuilds/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    # 只在打 tag 时才 publish；workflow_dispatch 仅做构建验证，不发布
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # npm provenance 需要
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds-all
      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          for d in prebuilds-all/prebuilds-*; do
            cp -r "$d"/* prebuilds/
          done
          echo "--- merged prebuilds ---"
          ls -R prebuilds
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
